# Static SPA serving for the I-Way frontend (production).
# The API is called directly on :8000 (CORS handles the cross-origin) — this
# server only delivers the Angular bundle.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build artifacts are immutable — cache hard.
    location ~* \.(js|css|woff2?|svg|png|jpg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every route resolves to index.html (Angular router takes over).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
