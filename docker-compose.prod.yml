# ============================================================
# I-Way Digital Twin — PRODUCTION Docker Compose (standalone)
# ============================================================
# Usage (on the deploy VM):
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences vs the dev compose (deliberate — see architecture review):
#   - API/worker/beat/flower run as NON-ROOT (appuser), no --reload, no source
#     bind mounts (code is baked into the image) → git pull no longer drops
#     every live WebSocket; uvicorn runs 2 workers.
#   - Frontend is a real production build (ng build → nginx), not ng serve.
#   - Ops UIs (pgAdmin/RedisInsight/Flower/Jaeger) bind to 127.0.0.1 only —
#     reach them via SSH tunnel, not the office LAN.
#   - ENVIRONMENT=production: disables the dev-only RFC1918 CORS regex; set
#     ALLOWED_ORIGINS to the real frontend origin(s).
#   - JWT keypair persists in the jwt_keys volume (restart ≠ global logout).
#
# NOTE: this is a standalone file (not an override) because compose overrides
# cannot REMOVE the dev file's .:/app bind mounts.
# ============================================================

x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: iway-twin:latest

x-app-env: &app-env
  ENVIRONMENT: production
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4200}
  DATABASE_URL: postgresql+asyncpg://iway:${DB_PASSWORD:-iway_secret}@db:5432/iway_db
  REDIS_URL: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/1
  IWAY_USE_REAL_API: ${IWAY_USE_REAL_API:-false}
  IWAY_API_BASE_URL: ${IWAY_API_BASE_URL:-http://localhost:8000}
  IWAY_API_KEY: ${IWAY_API_KEY:-}
  IWAY_SOAP_BASE_URL: ${IWAY_SOAP_BASE_URL:-http://192.168.111.102:8080/axis2/services}
  IWAY_SOAP_LOAD_LOCAL_WSDL: ${IWAY_SOAP_LOAD_LOCAL_WSDL:-true}
  IWAY_SOAP_USER: ${IWAY_SOAP_USER:-admin}
  IWAY_SOAP_PASSWORD: ${IWAY_SOAP_PASSWORD:-admin}
  IWAY_SOAP_TIMEOUT: ${IWAY_SOAP_TIMEOUT:-15}
  IWAY_SOAP_CONNECT_TIMEOUT: ${IWAY_SOAP_CONNECT_TIMEOUT:-5}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
  DB_HOST: db
  # Non-root: HuggingFace cache + JWT keys live on named volumes (see Dockerfile dirs)
  HF_HOME: /hf_cache
  JWT_KEYS_DIR: /app/keys

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  db:
    image: pgvector/pgvector:pg16
    container_name: iway-db
    environment:
      POSTGRES_DB: iway_db
      POSTGRES_USER: iway
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iway_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U iway -d iway_db" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: iway-redis
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-iway_redis_secret} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    restart: unless-stopped

  redis-broker:
    image: redis:7-alpine
    container_name: iway-redis-broker
    command: redis-server --requirepass ${REDIS_PASSWORD:-iway_redis_secret} --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redisbroker_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-iway_redis_secret} ping | grep PONG" ]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    restart: unless-stopped

  api:
    <<: *app-image
    container_name: iway-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      <<: *app-env
      MOCK_SERVER_URL: http://localhost:8000
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    ports:
      - "8000:8000"
    volumes:
      - jwt_keys:/app/keys
      - hf_cache_prod:/hf_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  worker:
    <<: *app-image
    container_name: iway-worker
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      <<: *app-env
    volumes:
      - hf_cache_prod:/hf_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  beat:
    <<: *app-image
    container_name: iway-beat
    command: celery -A backend.workers.celery_app beat --loglevel=info
    environment:
      <<: *app-env
    depends_on:
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  flower:
    <<: *app-image
    container_name: iway-flower
    command: celery -A backend.workers.celery_app flower --port=5555 --broker_api=redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/0 --persistent=True --db=/data/flower.db
    environment:
      <<: *app-env
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - flower_data:/data
    depends_on:
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iway-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@iway.tn
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: iway-redisinsight
    ports:
      - "127.0.0.1:5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: iway-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    # UI localhost-only; the OTLP receiver (4317) stays internal — services
    # reach it as jaeger:4317 on the compose network, no host publish needed.
    ports:
      - "127.0.0.1:16686:16686"
    logging: *default-logging
    restart: unless-stopped

  frontend:
    build:
      context: ./iway ui
      dockerfile: Dockerfile
    image: iway-frontend:latest
    container_name: iway-frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    logging: *default-logging
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  redisbroker_data:
  flower_data:
  pgadmin_data:
  redisinsight_data:
  hf_cache_prod:
  jwt_keys:
