[pytest]
# Offline-by-default: the `live` suites need the running Docker stack and `e2e`
# is Playwright — both are excluded from the standard run (and CI). Run them
# explicitly with `-m live` / `-m e2e`.
testpaths = tests
asyncio_mode = auto
# test_phase1_fixes.py / test_prompt_injection.py are standalone scripts (run via
# `python tests/<f>.py`, need `requests` + the live stack) — never pytest-collected.
addopts = -m "not live and not e2e"
    --ignore=tests/test_phase1_fixes.py
    --ignore=tests/test_prompt_injection.py
markers =
    live: requires the running Docker stack (DB/Redis/LAN) — excluded by default
    e2e: end-to-end browser tests (Playwright) — excluded by default
filterwarnings =
    # Scope the ignore to the known third-party noise (Pydantic v2 class-config),
    # so a real deprecation from our own code still surfaces in CI output.
    ignore::DeprecationWarning:pydantic
