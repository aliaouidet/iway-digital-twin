services:
  # Backend (FastAPI — in-memory mock DB)
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend (Streamlit + AI Engine with FAISS)
  chat_ui:
    build: ./frontend
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./ai_engine:/app/ai_engine
      - ./frontend/chat_ui.py:/app/chat_ui.py
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
