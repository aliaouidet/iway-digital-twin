services:
  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  # PostgreSQL Database
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # AI Engine (RAG & Agent)
  ai_engine:
    build: ./ai_engine
    env_file: .env
    volumes:
      - ./ai_engine/data:/app/data
    depends_on:
      - qdrant
    # CRITICAL FOR LINUX: This maps the host IP to a name inside the container
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Backend (FastAPI)
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/certs:/app/certs
    depends_on:
      - db
      - qdrant

  # Frontend (Streamlit)
  chat_ui:
    build: ./chat_ui
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data: