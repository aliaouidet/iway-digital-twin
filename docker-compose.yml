# ============================================================
# I-Way Digital Twin — Docker Compose
# Enterprise-grade local development environment
# ============================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f api    # Follow API logs
#   docker compose down -v        # Stop + remove volumes
#
# Monitoring UIs:
#   Flower       → http://localhost:5555  (Celery tasks)
#   pgAdmin      → http://localhost:5050  (PostgreSQL)
#   RedisInsight → http://localhost:5540  (Redis)
# ============================================================

services:

  # --- PostgreSQL + pgvector ---
  db:
    image: pgvector/pgvector:pg16
    container_name: iway-db
    environment:
      POSTGRES_DB: iway_db
      POSTGRES_USER: iway
      POSTGRES_PASSWORD: iway_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iway -d iway_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- Redis (pub/sub, cache, Celery broker) ---
  redis:
    image: redis:7-alpine
    container_name: iway-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- FastAPI Backend ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iway-api
    user: root
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://iway:iway_secret@db:5432/iway_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MOCK_SERVER_URL: http://localhost:8000
      IWAY_USE_REAL_API: ${IWAY_USE_REAL_API:-false}
      IWAY_API_BASE_URL: ${IWAY_API_BASE_URL:-http://localhost:8000}
      IWAY_API_KEY: ${IWAY_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Hot reload in development
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Celery Worker (background tasks: sync, embedding) ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iway-worker
    user: root
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://iway:iway_secret@db:5432/iway_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      IWAY_USE_REAL_API: ${IWAY_USE_REAL_API:-false}
      IWAY_API_BASE_URL: ${IWAY_API_BASE_URL:-http://localhost:8000}
      IWAY_API_KEY: ${IWAY_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Celery Beat (periodic task scheduler) ---
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iway-beat
    user: root
    command: celery -A backend.workers.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # MONITORING STACK
  # ============================================================

  # --- Flower (Celery Monitoring) ---
  # URL: http://localhost:5555
  # Shows: active tasks, worker status, task history, queues, graphs
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iway-flower
    user: root
    command: celery -A backend.workers.celery_app flower --port=5555 --broker_api=redis://redis:6379/1 --persistent=True --db=/data/flower.db
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    volumes:
      - .:/app
      - flower_data:/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- pgAdmin (PostgreSQL Monitoring & Administration) ---
  # URL: http://localhost:5050
  # Login: admin@iway.tn / admin
  # Shows: query tool, table browser, server activity, dashboard graphs
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iway-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@iway.tn
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./monitoring/pgadmin-servers.json:/pgadmin4/servers.json
      - ./monitoring/.pgpass:/pgadmin4/.pgpass:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # --- RedisInsight (Redis Monitoring) ---
  # URL: http://localhost:5540
  # Shows: key browser, memory analysis, slow log, streams, pub/sub
  redisinsight:
    image: redis/redisinsight:latest
    container_name: iway-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Angular Frontend (Development Server) ---
  frontend:
    image: node:20-alpine
    container_name: iway-frontend
    working_dir: /app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200 --disable-host-check --poll 2000"
    volumes:
      - "./iway ui:/app"
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - api
    restart: unless-stopped

  # --- Ollama (Local LLM Serving) ---
  # Uncomment and configure GPU passthrough for local LLM support
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: iway-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  hf_cache:
  frontend_node_modules:
  flower_data:
  pgadmin_data:
  redisinsight_data:
  # ollama_models:
