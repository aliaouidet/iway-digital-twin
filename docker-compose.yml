# ============================================================
# I-Way Digital Twin — Docker Compose
# Enterprise-grade local development environment
# ============================================================
# Usage:
#   docker compose up -d --build   # First run / after a dependency change
#   docker compose up -d           # Day-to-day (code hot-reloads via the bind mount)
#   docker compose logs -f api     # Follow API logs
#   docker compose down -v         # Stop + remove volumes
#
# The 4 Python services (api/worker/beat/flower) all run the SAME image
# (iway-twin:latest, built once) with different commands — see the &app-image
# anchor. Shared env and log limits are defined once via anchors too.
#
# Monitoring UIs:
#   Flower → :5555   pgAdmin → :5051   RedisInsight → :5540   Jaeger → :16686
# ============================================================

# --- Reusable building blocks (YAML anchors) ----------------------------------
x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: iway-twin:latest          # one image, reused by all 4 Python services

x-app-env: &app-env                # shared env for api + worker (the data-layer services)
  DATABASE_URL: postgresql+asyncpg://iway:iway_secret@db:5432/iway_db
  REDIS_URL: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis:6379/0
  # Celery runs on its OWN Redis (redis-broker, noeviction). The cache Redis
  # uses allkeys-lru — sharing it meant queued tasks could be silently EVICTED
  # under memory pressure (the classic Redis-as-broker footgun).
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/1
  IWAY_USE_REAL_API: ${IWAY_USE_REAL_API:-false}
  IWAY_API_BASE_URL: ${IWAY_API_BASE_URL:-http://localhost:8000}
  IWAY_API_KEY: ${IWAY_API_KEY:-}
  # Real I-Way SOAP services (live calls need the company LAN; WSDLs bundled in ./Webservices)
  IWAY_SOAP_BASE_URL: ${IWAY_SOAP_BASE_URL:-http://192.168.111.102:8080/axis2/services}
  IWAY_SOAP_LOAD_LOCAL_WSDL: ${IWAY_SOAP_LOAD_LOCAL_WSDL:-true}
  IWAY_SOAP_USER: ${IWAY_SOAP_USER:-admin}
  IWAY_SOAP_PASSWORD: ${IWAY_SOAP_PASSWORD:-admin}
  IWAY_SOAP_TIMEOUT: ${IWAY_SOAP_TIMEOUT:-15}
  IWAY_SOAP_CONNECT_TIMEOUT: ${IWAY_SOAP_CONNECT_TIMEOUT:-5}
  OLLAMA_BASE_URL: http://ollama:11434/v1
  GCP_PROJECT_ID: ${GCP_PROJECT_ID:-caramel-medley-407500}
  GCP_LOCATION: ${GCP_LOCATION:-us-central1}
  GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
  DB_HOST: db

x-logging: &default-logging        # cap container logs so they never fill the disk
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # --- PostgreSQL + pgvector ---
  db:
    image: pgvector/pgvector:pg16
    container_name: iway-db
    environment:
      POSTGRES_DB: iway_db
      POSTGRES_USER: iway
      POSTGRES_PASSWORD: iway_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U iway -d iway_db" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  # --- Redis Stack (pub/sub + semantic cache ONLY — broker moved to redis-broker) ---
  redis:
    image: redis/redis-stack-server:latest
    container_name: iway-redis
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-iway_redis_secret} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    restart: unless-stopped

  # --- Redis (Celery broker + results — dedicated, NON-evictable) ---
  # noeviction: a full broker fails loudly instead of silently dropping tasks.
  redis-broker:
    image: redis:7-alpine
    container_name: iway-redis-broker
    command: redis-server --requirepass ${REDIS_PASSWORD:-iway_redis_secret} --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redisbroker_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-iway_redis_secret} ping | grep PONG" ]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    restart: unless-stopped

  # --- FastAPI Backend ---
  api:
    <<: *app-image
    container_name: iway-api
    user: root
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      <<: *app-env
      MOCK_SERVER_URL: http://localhost:8000
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    ports:
      - "8000:8000"
    volumes:
      - .:/app # Hot reload in development
      - hf_cache:/root/.cache/huggingface
      - ${APPDATA:-~/.config}/gcloud:/root/.config/gcloud:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # --- Celery Worker (background tasks: sync, embedding) ---
  worker:
    <<: *app-image
    container_name: iway-worker
    user: root
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      <<: *app-env
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
      - ${APPDATA:-~/.config}/gcloud:/root/.config/gcloud:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # --- Celery Beat (periodic task scheduler) ---
  beat:
    <<: *app-image
    container_name: iway-beat
    user: root
    command: celery -A backend.workers.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/1
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # ============================================================
  # MONITORING STACK
  # ============================================================

  # --- Flower (Celery Monitoring) ---  URL: http://localhost:5555
  flower:
    <<: *app-image
    container_name: iway-flower
    user: root
    command: celery -A backend.workers.celery_app flower --port=5555 --broker_api=redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/0 --persistent=True --db=/data/flower.db
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-iway_redis_secret}@redis-broker:6379/1
    ports:
      - "5555:5555"
    volumes:
      - .:/app
      - flower_data:/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis-broker:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # --- pgAdmin (PostgreSQL Monitoring) ---  URL: http://localhost:5051 (admin@iway.tn / admin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iway-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@iway.tn
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./monitoring/pgadmin-servers.json:/pgadmin4/servers.json
      - ./monitoring/.pgpass:/pgadmin4/.pgpass:ro
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # --- RedisInsight (Redis Monitoring) ---  URL: http://localhost:5540
  redisinsight:
    image: redis/redisinsight:latest
    container_name: iway-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # --- Jaeger (OpenTelemetry Distributed Tracing) ---  URL: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: iway-jaeger
    # The image's non-root user can't create dirs in the root-owned volume.
    user: root
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # Badger storage: traces survive restarts (default is in-memory — every
      # restart wiped the whole trace history).
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - jaeger_data:/badger
    ports:
      - "16686:16686" # Web UI
      - "4317:4317" # OTLP gRPC receiver
    logging: *default-logging
    restart: unless-stopped

  # --- Prometheus (metrics) ---  URL: http://localhost:5590
  prometheus:
    image: prom/prometheus:latest
    container_name: iway-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "5590:9090"
    logging: *default-logging
    restart: unless-stopped

  # --- Grafana (dashboards) ---  URL: http://localhost:3000 (admin / admin)
  grafana:
    image: grafana/grafana:latest
    container_name: iway-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    logging: *default-logging
    restart: unless-stopped

  # --- Angular Frontend (Development Server) ---
  frontend:
    image: node:20-alpine
    container_name: iway-frontend
    working_dir: /app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200 --disable-host-check --poll 2000"
    volumes:
      - "./iway ui:/app"
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - api
    logging: *default-logging
    restart: unless-stopped

  # --- Ollama (Local LLM Serving) ---
  # Uncomment and configure GPU passthrough for local LLM support
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: iway-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  redisbroker_data:
  frontend_node_modules:
  flower_data:
  pgadmin_data:
  redisinsight_data:
  jaeger_data:
  prometheus_data:
  grafana_data:
  hf_cache: # ollama_models:
